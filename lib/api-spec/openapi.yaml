openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FranchiseIntelligenceOS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: locations
  - name: licenses
  - name: compliance
  - name: tasks
  - name: audits
  - name: documents
  - name: ai
  - name: dashboard
  - name: expansion
  - name: notifications
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List franchise locations
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a franchise location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
  /locations/{id}:
    get:
      operationId: getLocation
      tags: [locations]
      summary: Get a location
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    patch:
      operationId: updateLocation
      tags: [locations]
      summary: Update a location
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a location
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /licenses:
    get:
      operationId: listLicenses
      tags: [licenses]
      summary: List licenses (optionally by location)
      parameters:
        - name: locationId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/License"
    post:
      operationId: createLicense
      tags: [licenses]
      summary: Create a license
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
  /licenses/{id}:
    patch:
      operationId: updateLicense
      tags: [licenses]
      summary: Update a license
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteLicense
      tags: [licenses]
      summary: Delete a license
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /compliance:
    get:
      operationId: listComplianceChecks
      tags: [compliance]
      summary: List compliance checks (optionally by location)
      parameters:
        - name: locationId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of compliance checks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceCheck"
    post:
      operationId: createComplianceCheck
      tags: [compliance]
      summary: Create a compliance check
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceCheckInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceCheck"
  /compliance/{id}:
    patch:
      operationId: updateComplianceCheck
      tags: [compliance]
      summary: Update a compliance check
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceCheckUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceCheck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteComplianceCheck
      tags: [compliance]
      summary: Delete a compliance check
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (optionally by location or status)
      parameters:
        - name: locationId
          in: query
          required: false
          schema: { type: integer }
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /audits:
    get:
      operationId: listAudits
      tags: [audits]
      summary: List audits (optionally by location)
      parameters:
        - name: locationId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of audits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Audit"
    post:
      operationId: createAudit
      tags: [audits]
      summary: Create an audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuditInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Audit"
  /audits/{id}:
    delete:
      operationId: deleteAudit
      tags: [audits]
      summary: Delete an audit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents (optionally by location or task)
      parameters:
        - name: locationId
          in: query
          required: false
          schema: { type: integer }
        - name: taskId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document (SOP, policy, or note; content is searchable by the AI assistant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document with content
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      summary: List AI conversations
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
  /ai/conversations/{id}/messages:
    get:
      operationId: listConversationMessages
      tags: [ai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
  /ai/conversations/{id}:
    delete:
      operationId: deleteConversation
      tags: [ai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /ai/chat:
    post:
      operationId: sendChatMessage
      tags: [ai]
      summary: Send a message to the AI assistant (creates a conversation if none given)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Current real-time alerts (expiring licenses, overdue tasks)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Portfolio-wide summary metrics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity across all modules
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
  /expansion/readiness:
    get:
      operationId: getExpansionReadiness
      tags: [expansion]
      summary: Expansion readiness scores by state
      responses:
        "200":
          description: Readiness by state
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StateReadiness"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorMessage:
      type: object
      required: [error]
      properties:
        error: { type: string }
    CurrentUser:
      type: object
      required: [id, email, name, role]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [admin, manager, user] }
    Location:
      type: object
      required: [id, name, city, state, status, complianceScore]
      properties:
        id: { type: integer }
        name: { type: string }
        address: { type: ["string", "null"] }
        city: { type: string }
        state: { type: string }
        zip: { type: ["string", "null"] }
        ownerName: { type: ["string", "null"] }
        status: { type: string, enum: [active, onboarding, closed] }
        openedDate: { type: ["string", "null"] }
        complianceScore: { type: integer }
    LocationInput:
      type: object
      required: [name, city, state]
      properties:
        name: { type: string, minLength: 1 }
        address: { type: string }
        city: { type: string, minLength: 1 }
        state: { type: string, minLength: 2 }
        zip: { type: string }
        ownerName: { type: string }
        status: { type: string, enum: [active, onboarding, closed] }
        openedDate: { type: string }
    LocationUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        zip: { type: string }
        ownerName: { type: string }
        status: { type: string, enum: [active, onboarding, closed] }
        openedDate: { type: string }
    License:
      type: object
      required: [id, locationId, name, type, status, expiryDate]
      properties:
        id: { type: integer }
        locationId: { type: integer }
        name: { type: string }
        type: { type: string }
        issuedDate: { type: ["string", "null"] }
        expiryDate: { type: string }
        status: { type: string, enum: [valid, expiring, expired] }
    LicenseInput:
      type: object
      required: [locationId, name, type, expiryDate]
      properties:
        locationId: { type: integer }
        name: { type: string, minLength: 1 }
        type: { type: string, minLength: 1 }
        issuedDate: { type: string }
        expiryDate: { type: string }
    LicenseUpdate:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        issuedDate: { type: string }
        expiryDate: { type: string }
    ComplianceCheck:
      type: object
      required: [id, locationId, category, description, status, score, checkedAt]
      properties:
        id: { type: integer }
        locationId: { type: integer }
        category: { type: string }
        description: { type: string }
        status: { type: string, enum: [pass, warn, fail] }
        score: { type: integer }
        checkedAt: { type: string }
        dueDate: { type: ["string", "null"] }
    ComplianceCheckInput:
      type: object
      required: [locationId, category, description, status, score]
      properties:
        locationId: { type: integer }
        category: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        status: { type: string, enum: [pass, warn, fail] }
        score: { type: integer, minimum: 0, maximum: 100 }
        dueDate: { type: string }
    ComplianceCheckUpdate:
      type: object
      properties:
        category: { type: string }
        description: { type: string }
        status: { type: string, enum: [pass, warn, fail] }
        score: { type: integer, minimum: 0, maximum: 100 }
        dueDate: { type: string }
    Task:
      type: object
      required: [id, title, status, priority, source, createdAt]
      properties:
        id: { type: integer }
        locationId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        status: { type: string, enum: [todo, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        source: { type: string, enum: [manual, compliance] }
        dueDate: { type: ["string", "null"] }
        createdAt: { type: string }
    TaskInput:
      type: object
      required: [title]
      properties:
        locationId: { type: integer }
        title: { type: string, minLength: 1 }
        description: { type: string }
        status: { type: string, enum: [todo, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string }
    TaskUpdate:
      type: object
      properties:
        locationId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [todo, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string }
    Audit:
      type: object
      required: [id, locationId, auditor, score, conductedAt]
      properties:
        id: { type: integer }
        locationId: { type: integer }
        auditor: { type: string }
        score: { type: integer }
        notes: { type: ["string", "null"] }
        conductedAt: { type: string }
    AuditInput:
      type: object
      required: [locationId, auditor, score]
      properties:
        locationId: { type: integer }
        auditor: { type: string, minLength: 1 }
        score: { type: integer, minimum: 0, maximum: 100 }
        notes: { type: string }
        conductedAt: { type: string }
    Document:
      type: object
      required: [id, name, category, uploadedAt]
      properties:
        id: { type: integer }
        locationId: { type: ["integer", "null"] }
        taskId: { type: ["integer", "null"] }
        name: { type: string }
        category: { type: string }
        content: { type: ["string", "null"] }
        objectPath: { type: ["string", "null"] }
        fileType: { type: ["string", "null"] }
        fileSize: { type: ["integer", "null"] }
        uploadedAt: { type: string }
    DocumentInput:
      type: object
      required: [name, category]
      properties:
        locationId: { type: integer }
        taskId: { type: integer }
        name: { type: string, minLength: 1 }
        category: { type: string, minLength: 1 }
        content: { type: string }
        objectPath: { type: string }
        fileType: { type: string }
        fileSize: { type: integer }
    Conversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        createdAt: { type: string }
    ChatMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        createdAt: { type: string }
    ChatRequest:
      type: object
      required: [message]
      properties:
        conversationId: { type: integer }
        message: { type: string, minLength: 1 }
    ChatResponse:
      type: object
      required: [conversationId, reply]
      properties:
        conversationId: { type: integer }
        reply: { type: string }
    DashboardSummary:
      type: object
      required: [totalLocations, activeLocations, avgComplianceScore, openTasks, overdueTasks, expiringLicenses, failedChecks, documentsCount, riskAlerts]
      properties:
        totalLocations: { type: integer }
        activeLocations: { type: integer }
        avgComplianceScore: { type: integer }
        openTasks: { type: integer }
        overdueTasks: { type: integer }
        expiringLicenses: { type: integer }
        failedChecks: { type: integer }
        documentsCount: { type: integer }
        riskAlerts: { type: integer }
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Notification:
      type: object
      required: [id, type, severity, title, message, createdAt]
      properties:
        id: { type: string }
        type: { type: string, enum: [license_expiring, task_overdue] }
